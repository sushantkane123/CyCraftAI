<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BradlyAI - Autonomous Driverless SOC & Incident Response Platform</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS animations for interactive SVGs and loaders */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animation-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }
        .animation-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>

    <!-- Header & App Navigation -->
    <header>
        <div class="logo-container" onclick="app.switchTab('dashboard')">
            <div class="logo-hex">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
            <div class="logo-text">
                BradlyAI <span style="font-weight: 300;">AI</span>
            </div>
            <span class="logo-tag">Driverless SOC</span>
        </div>

        <nav class="nav-tabs">
            <button class="nav-btn active" data-tab="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Executive Dashboard</span>
            </button>
            <button class="nav-btn" data-tab="air">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span>AIR Live Pipeline</span>
            </button>
            <button class="nav-btn" data-tab="asm">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span>Attack Surface (ASM)</span>
            </button>
            <button class="nav-btn" data-tab="forensics">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>AI Threat Hunter</span>
            </button>
            <button class="nav-btn" data-tab="mitre">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>MITRE ATT&CK Matrix</span>
            </button>
            <button class="nav-btn" data-tab="copilot">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>AI Security Copilot</span>
            </button>
        </nav>

        <div class="header-actions">
            <div class="driverless-badge">
                <span class="status-dot"></span>
                <span>Driverless Active</span>
            </div>

            <button onclick="app.openSettingsModal()" class="btn-filter" style="background:rgba(255,255,255,0.05); border-color:var(--border-color); color:white; display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>SOC Settings</span>
            </button>

            <button id="btn-trigger-sim" class="btn-trigger-attack">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Trigger Simulated Attack</span>
            </button>
        </div>
    </header>

    <!-- Real-time Security Marquee Banner -->
    <div class="security-ticker">
        <div class="ticker-label">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><circle cx="12" cy="12" r="10"/></svg>
            <span>Autonomous Triage Stream</span>
        </div>
        <div class="ticker-content" id="ticker-content">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Main Dynamic Application Content Area -->
    <main>
        <!-- Top Stats (Visible across core views) -->
        <div class="stats-grid" id="stats-grid">
            <!-- Populated by JS -->
        </div>

        <div id="main-content">
            <!-- Dynamic Tab View Rendered by JS -->
        </div>
    </main>

    <!-- Modals Overlay Container -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card" id="modal-card">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Emergency Attack Simulation Modal Overlay -->
    <div class="modal-overlay" id="sim-modal-overlay">
    </div>

    <!-- SOC Advanced System Settings Modal Overlay -->
    <div class="modal-overlay" id="settings-modal-overlay">
        <div class="modal-card" id="settings-modal-card">
        </div>
    </div>

    <!-- App Data & Logic Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
